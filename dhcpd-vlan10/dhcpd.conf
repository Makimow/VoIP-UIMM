default-lease-time 600;
max-lease-time 7200;
authoritative;  # Ce serveur est l’autorité DHCP pour ce réseau

subnet 192.168.120.0 netmask 255.255.255.0 {
    range 192.168.120.100 192.168.120.150;

    option routers 192.168.120.1;

    option domain-name-servers 8.8.8.8;

    option domain-name "voice.local";
}

INTERFACESv4="eth0";
